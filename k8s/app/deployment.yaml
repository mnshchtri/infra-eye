apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-eye
  namespace: infra-eye
  labels:
    app: infra-eye
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-eye
  template:
    metadata:
      labels:
        app: infra-eye
    spec:
      serviceAccountName: infra-eye-sa
      # Allow the MCP sidecar to reach the k3s API on the host node
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "host.docker.internal"

      containers:
        # ── Main application ────────────────────────────────────────────────
        - name: app
          image: ghcr.io/mnshchtri/infra-eye:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: infra-eye-config
            - secretRef:
                name: infra-eye-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

        # ── MCP sidecar — Native in-cluster connection ─────────────────
        - name: mcp-server
          image: ghcr.io/containers/kubernetes-mcp-server:latest
          args:
            - "--port"
            - "8090"
            - "--cluster-provider"
            - "in-cluster"
          ports:
            - name: mcp
              containerPort: 8090
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
