apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-eye-sa
  namespace: infra-eye
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-eye-mcp-admin-binding
subjects:
  - kind: ServiceAccount
    name: infra-eye-sa
    namespace: infra-eye
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
