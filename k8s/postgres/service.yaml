---
# Headless service — stable DNS for StatefulSet pod (postgres-0.postgres-headless)
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: infra-eye
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
# Regular ClusterIP service — what the app connects to via DB_DSN
# Has a stable virtual IP regardless of pod readiness state
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: infra-eye
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
