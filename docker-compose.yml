services:
  postgres:
    image: postgres:16-alpine
    container_name: infra-eye-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=infraeye
      - POSTGRES_PASSWORD=infraeye123
      - POSTGRES_DB=infraeye
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5432:5432"
    command: postgres -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infraeye -d infraeye"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: infra-eye-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ensures shared_mcp dir and kubeconfig file exist before other services start
  mcp-init:
    image: alpine:latest
    container_name: infra-eye-mcp-init
    restart: "no"
    volumes:
      - ./shared_mcp:/mcp
    command: >
      sh -c "mkdir -p /mcp && echo 'apiVersion: v1\nkind: Config\nclusters:\n- cluster: {server: https://localhost:6443}\n  name: empty\ncontexts:\n- context: {cluster: empty, user: empty}\n  name: empty\ncurrent-context: empty\nusers:\n- name: empty' > /mcp/kubeconfig && chmod 777 /mcp && chmod 666 /mcp/kubeconfig && echo '✅ MCP volume initialized.'"

  mcp-server:
    image: ghcr.io/containers/kubernetes-mcp-server:latest
    container_name: infra-eye-mcp
    restart: unless-stopped
    depends_on:
      - mcp-init
      # NOTE: No dependency on 'app' — that was a circular dependency.
      # The MCP server starts with an empty kubeconfig and the backend syncs it on startup.
    volumes:
      - ./shared_mcp:/mcp:ro
    command: ["--port", "8090", "--kubeconfig", "/mcp/kubeconfig", "--cluster-provider", "kubeconfig"]
    ports:
      - "127.0.0.1:8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infra-eye-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DB_DSN=postgresql://infraeye:infraeye123@postgres:5432/infraeye?sslmode=disable
      - REDIS_ADDR=redis:6379
      - MCP_SERVER_URL=http://infra-eye-mcp:8090
      - GIN_MODE=release
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      # IPs that OrbStack/Docker containers cannot reach directly on the LAN.
      # These get patched to host.docker.internal so MCP traffic routes through the host gateway.
      # Add any K8s server IPs here that are on your local network, comma-separated.
      - MCP_HOST_IPS=${MCP_HOST_IPS:-}
    ports:
      - "8080:8080"
    volumes:
      - ./shared_mcp:/shared_mcp
      - ~/.kube/config:/kubeconfig_host:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
