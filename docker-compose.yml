

services:
  postgres:
    image: postgres:16-alpine
    container_name: infra-eye-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infraeye
      POSTGRES_PASSWORD: infraeye123
      POSTGRES_DB: infraeye
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infraeye"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: infra-eye-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infra-eye-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "80:80"
      - "8080:8080" # Optional: for direct backend access if needed

volumes:
  postgres_data:
  redis_data:
