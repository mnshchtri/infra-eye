

services:
  postgres:
    image: postgres:16-alpine
    container_name: infra-eye-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infraeye
      POSTGRES_PASSWORD: infraeye123
      POSTGRES_DB: infraeye
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infraeye"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: infra-eye-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    image: ghcr.io/containers/kubernetes-mcp-server:latest
    container_name: infra-eye-mcp
    restart: unless-stopped
    command: ["--port", "8090", "--read-only=false", "--kubeconfig", "/root/.kube/config"]
    volumes:
      - ~/.kube:/root/.kube:ro
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infra-eye-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_DSN=postgresql://infraeye:infraeye123@postgres:5432/infraeye?sslmode=disable
      - REDIS_URL=redis:6379
      - MCP_SERVER_URL=http://mcp-server:8090
    ports:
      - "8081:80"

volumes:
  postgres_data:
  redis_data:
