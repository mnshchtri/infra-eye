version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: infra-eye-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infraeye
      POSTGRES_PASSWORD: infraeye123
      POSTGRES_DB: infraeye
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infraeye"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: infra-eye-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: infra-eye-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_DSN=postgresql://infraeye:infraeye123@postgres:5432/infraeye?sslmode=disable
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=infra-eye-prod-secret
      - PORT=8080
      - ENV=production
      # - OPENAI_API_KEY=your_key_here
    ports:
      - "8080:8080"

  frontend:
    build: 
      context: ./frontend
    container_name: infra-eye-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
